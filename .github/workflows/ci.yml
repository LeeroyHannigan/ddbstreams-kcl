name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (aws feature)
        run: cargo clippy --workspace --all-targets --features aws -- -D warnings
      # Unit + offline integration tests. Live tests are gated on
      # DDB_STREAMS_CONSUMER_IT and skip themselves without it, so CI needs no
      # AWS credentials.
      - name: Test
        run: cargo test --workspace

  python:
    name: Python client
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        working-directory: clients/python
        run: python -m unittest discover -s tests

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for AWS (live integration tests); unused if not configured
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      # Live integration tests require AWS. They run only when the AWS_ROLE_ARN
      # secret is set AND this is not a fork PR — forks receive neither the
      # secret nor an OIDC token. Otherwise coverage runs offline (the
      # AWS-adapter files then report low coverage, which is expected).
      # A secret (not a variable) keeps the account ID out of the public repo;
      # secrets can't be used in `if:`, so this step converts its presence to an
      # output the next step can gate on.
      - name: Check AWS config
        id: awscfg
        env:
          ROLE: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          enabled=false
          if [ -n "$ROLE" ]; then
            if [ "${{ github.event_name }}" != "pull_request" ] \
               || [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              enabled=true
            fi
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        id: aws
        if: steps.awscfg.outputs.enabled == 'true'
        continue-on-error: true # if the role isn't set up yet, fall back to offline coverage
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run coverage
        run: |
          set -euo pipefail
          if [ "${{ steps.aws.outcome }}" = "success" ]; then
            echo "Running WITH live integration tests"
            DDB_STREAMS_CONSUMER_IT=1 cargo llvm-cov --no-report --workspace --features aws
          else
            echo "Running offline (no AWS credentials configured)"
            cargo llvm-cov --no-report --workspace
          fi
          cargo llvm-cov report --lcov --output-path lcov.info
          {
            echo '### Coverage'
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Posts a PR comment with total + diff (changed-lines) coverage and a
      # status check, once the repository is enabled on codecov.io. Free for
      # public repositories.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

