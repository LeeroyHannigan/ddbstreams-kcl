name: Release

# Lockstep releases: a single `vX.Y.Z` tag releases the whole project.
# (A future Go client uses a path-prefixed tag, e.g. `clients/go/vX.Y.Z`.)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # Pull the release notes for this version out of the changelog.
          changelog: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sidecar-binaries:
    name: Sidecar (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux assets are static musl so the auto-downloaded sidecar has NO
          # glibc dependency and runs on any Linux (Amazon Linux 2, old distros,
          # scratch containers). Built via cargo-zigbuild.
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, build-tool: cargo-zigbuild }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, build-tool: cargo-zigbuild }
          - { os: macos-latest, target: aarch64-apple-darwin, build-tool: cargo }
          # macOS x86_64 is cross-compiled here; the Intel macos-13 image is deprecated.
          - { os: macos-latest, target: x86_64-apple-darwin, build-tool: cargo }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, build-tool: cargo }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      # Builds the sidecar for the target (handles cross-compilation incl. linux
      # aarch64 and macOS x86_64) and uploads a tarball/zip to the release.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: amazon-dynamodb-streams-consumer-sidecar
          features: otel
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
      # Also publish a STABLE, language-neutral raw asset that every binding's
      # auto-downloader consumes:
      #   amazon-dynamodb-streams-consumer-sidecar-<os>-<arch>[.exe]  (+ .sha256)
      # os in {linux,darwin,windows}, arch in {x86_64,aarch64}. The Go client's
      # sidecar.go resolves exactly this name; future bindings reuse the contract.
      - name: Stage stable-named sidecar asset
        shell: bash
        run: |
          set -euo pipefail
          bin=amazon-dynamodb-streams-consumer-sidecar
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)  os=linux;   arch=x86_64;  ext="" ;;
            aarch64-unknown-linux-musl) os=linux;   arch=aarch64; ext="" ;;
            aarch64-apple-darwin)      os=darwin;  arch=aarch64; ext="" ;;
            x86_64-apple-darwin)       os=darwin;  arch=x86_64;  ext="" ;;
            x86_64-pc-windows-msvc)    os=windows; arch=x86_64;  ext=".exe" ;;
            *) echo "unknown target ${{ matrix.target }}"; exit 1 ;;
          esac
          mkdir -p stable
          src="target/${{ matrix.target }}/release/${bin}${ext}"
          dst="stable/${bin}-${os}-${arch}${ext}"
          cp "$src" "$dst"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$dst" | awk '{print $1}' > "${dst}.sha256"
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$dst" | awk '{print $1}' > "${dst}.sha256"
          else
            certutil -hashfile "$dst" SHA256 | sed -n 2p | tr -d ' \r' > "${dst}.sha256"
          fi
          ls -l stable/
      - name: Upload stable sidecar asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: stable/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-wheels:
    name: Python wheels (${{ matrix.os }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest] # macOS x86_64 cross-compiled (Intel macos-13 is deprecated)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'x86_64-apple-darwin' || '' }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade build wheel
      # Compiles the sidecar for this host and bundles it into a platform wheel.
      # On macOS also cross-builds the x86_64 wheel and relabels its platform tag.
      - name: Build platform wheel(s) with bundled sidecar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          bash clients/python/build_wheel.sh
          mv clients/python/dist/*.whl out/
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            bash clients/python/build_wheel.sh x86_64-apple-darwin
            python -m wheel tags --platform-tag macosx_11_0_x86_64 --remove clients/python/dist/*.whl
            mv clients/python/dist/*.whl out/
          fi
          ls -l out/
      # The sdist is platform-independent; build it once.
      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        run: python -m build --sdist --outdir out clients/python
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE: linux wheels are tagged linux_x86_64 here; for PyPI they must be
  # repaired to manylinux (auditwheel) and linux aarch64 added via an ARM runner
  # or cross-build. Deferred until registry publishing is enabled.

  # --- Registry publishing (disabled until 1.0 / accounts configured) ----------
  # When ready to publish to public registries, enable these. Both support OIDC
  # "trusted publishing" so no long-lived tokens need to be stored as secrets.
  #
  # PyPI (recommended: trusted publishing via a `pypi` environment):
  #   publish-pypi:
  #     needs: python-dist
  #     runs-on: ubuntu-latest
  #     environment: pypi
  #     permissions: { id-token: write }
  #     steps:
  #       - uses: actions/download-artifact@v4   # or rebuild
  #       - uses: pypa/gh-action-pypi-publish@release/v1
  #
  # crates.io (requires adding `version` to intra-repo path deps and publishing
  # in dependency order: core -> protocol -> source -> lease -> worker -> sidecar):
  #   publish-crates:
  #     needs: create-release
  #     runs-on: ubuntu-latest
  #     steps:
  #       - uses: actions/checkout@v5
  #       - uses: dtolnay/rust-toolchain@stable
  #       - run: |
  #           for c in core protocol source lease worker sidecar; do
  #             cargo publish -p amazon-dynamodb-streams-consumer-$c
  #           done
  #         env: { CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }} }
