name: Release

# Lockstep releases: a single `vX.Y.Z` tag releases the whole project.
# (A future Go client uses a path-prefixed tag, e.g. `clients/go/vX.Y.Z`.)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # Pull the release notes for this version out of the changelog.
          changelog: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sidecar-binaries:
    name: Sidecar (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      # Builds the sidecar for the target and uploads a tarball to the release.
      # Handles cross-compilation (incl. linux aarch64) and archiving.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: amazon-dynamodb-streams-consumer-sidecar
          target: ${{ matrix.target }}
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  python-wheels:
    name: Python wheel (${{ matrix.os }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13] # linux x86_64, macOS arm64, macOS x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade build
      # Compiles the sidecar for this host and bundles it into a platform wheel.
      - name: Build platform wheel (bundled sidecar)
        run: bash clients/python/build_wheel.sh
      # The sdist is platform-independent; build it once.
      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        run: python -m build --sdist clients/python
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: clients/python/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE: linux wheels are tagged linux_x86_64 here; for PyPI they must be
  # repaired to manylinux (auditwheel) and linux aarch64 added via an ARM runner
  # or cross-build. Deferred until registry publishing is enabled.

  # --- Registry publishing (disabled until 1.0 / accounts configured) ----------
  # When ready to publish to public registries, enable these. Both support OIDC
  # "trusted publishing" so no long-lived tokens need to be stored as secrets.
  #
  # PyPI (recommended: trusted publishing via a `pypi` environment):
  #   publish-pypi:
  #     needs: python-dist
  #     runs-on: ubuntu-latest
  #     environment: pypi
  #     permissions: { id-token: write }
  #     steps:
  #       - uses: actions/download-artifact@v4   # or rebuild
  #       - uses: pypa/gh-action-pypi-publish@release/v1
  #
  # crates.io (requires adding `version` to intra-repo path deps and publishing
  # in dependency order: core -> protocol -> source -> lease -> worker -> sidecar):
  #   publish-crates:
  #     needs: create-release
  #     runs-on: ubuntu-latest
  #     steps:
  #       - uses: actions/checkout@v5
  #       - uses: dtolnay/rust-toolchain@stable
  #       - run: |
  #           for c in core protocol source lease worker sidecar; do
  #             cargo publish -p amazon-dynamodb-streams-consumer-$c
  #           done
