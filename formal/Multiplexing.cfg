\* TLC model-check configuration for the multiplexing scheduler (extended:
\* multi-worker ownership + online resize + reshard). Run once, not in CI;
\* see README.md. Topology (workers/shards/parent) is fixed in Multiplexing.tla.
CONSTANTS
    MaxSeq = 1
    MaxCap = 2
    MaxCrashes = 1
    MaxHandoffs = 1

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT PerWorkerBound
INVARIANT MutualExclusion
INVARIANT OwnedWhileProc
INVARIANT ParentBeforeChild
INVARIANT CheckpointOK
INVARIANT AtLeastOnce

PROPERTY Termination
